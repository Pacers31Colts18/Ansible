- name: Group Policy - Backup
  hosts: domain_controllers
  vars:
    backupPath: 'C:\Windows\Temp\GPOBackup'
  vars_prompt:
    - name: sourceDomain
      prompt: What is the source domain?
      private: false
  tasks:
    - name: Ensure Domain Controllers are available
      ansible.windows.win_ping:

    - name: Ensure GPMC is available
      ansible.windows.win_feature:
        name: GPMC
        state: present

    - name: Show input vars
      ansible.builtin.debug:
        msg: "Domain: {{ sourceDomain }}"

    - name: Backup all GPOs
      ansible.windows.win_powershell:
        script: |
          $date = Get-Date -Format 'yyyy-MM-dd'
          $fullPath = '{{ backupPath }}' + '\' + $date
          if (-not (Test-Path $fullPath)) {
              New-Item -ItemType Directory -Path $fullPath | Out-Null
          }
          $allGpos = Get-GPO -All -Domain '{{ sourceDomain }}'
          $results = @()
          foreach ($gpo in $allGpos) {
              try {
                  $backup = Backup-GPO -Name $gpo.DisplayName -Domain '{{ sourceDomain }}' -Path $fullPath -ErrorAction Stop
                  $results += [PSCustomObject]@{
                      DisplayName   = $gpo.DisplayName
                      BackupId      = $backup.Id
                      BackupSuccess = $true
                      BackupPath    = $fullPath
                  }
              }
              catch {
                  $results += [PSCustomObject]@{
                      DisplayName   = $gpo.DisplayName
                      BackupSuccess = $false
                      BackupError   = $_.Exception.Message
                  }
              }
          }
          foreach ($result in $results) {
              Write-Output $result
          }
      register: backupResults

    - name: Show backup results
      ansible.builtin.debug:
        var: backupResults.output