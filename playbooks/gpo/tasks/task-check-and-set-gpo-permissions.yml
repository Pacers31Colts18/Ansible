- name: Check and set GPO permissions
  ansible.windows.win_powershell:
    script: |
      $targetDomain = '{{ targetDomain }}'
      $targetDC = '{{ targetDC }}'
      $gpoName = '{{ gpoName }}'
      $group = '{{ group }}'
      $groupPermissions = '{{ groupPermissions }}'

      try {
          $perm = Get-GPPermission -Name $gpoName -TargetName $group -TargetType Group `
                      -Domain $targetDomain -Server $targetDC -ErrorAction SilentlyContinue
          if ($perm) {
              Write-Output ([PSCustomObject]@{
                  GPOName         = $gpoName
                  Group           = $group
                  PermissionSet   = $false
                  PermissionLevel = $perm.Permission.ToString()
                  AlreadyGranted  = $true
              })
          } else {
              Set-GPPermission -Name $gpoName -TargetName $group -TargetType Group `
                  -PermissionLevel $groupPermissions -Domain $targetDomain -Server $targetDC -ErrorAction Stop
              Write-Output ([PSCustomObject]@{
                  GPOName         = $gpoName
                  Group           = $group
                  PermissionSet   = $true
                  PermissionLevel = $groupPermissions
                  AlreadyGranted  = $false
              })
          }
      }
      catch {
          Write-Output ([PSCustomObject]@{
              GPOName         = $gpoName
              Group           = $group
              PermissionSet   = $false
              PermissionLevel = $null
              AlreadyGranted  = $false
              SetError        = $_.Exception.Message
          })
      }
  register: gpoPermResult
  changed_when: gpoPermResult.output | selectattr('PermissionSet', 'defined') | map(attribute='PermissionSet') | list | last | bool

- name: Permission already granted
  ansible.builtin.debug:
    msg: "Group '{{ group }}' already has '{{ (gpoPermResult.output | selectattr('PermissionLevel', 'defined') | list | last).PermissionLevel }}' on GPO '{{ gpoName }}'. No changes made."
  when: gpoPermResult.output | selectattr('AlreadyGranted', 'defined') | map(attribute='AlreadyGranted') | list | last | bool

- name: Permission granted
  ansible.builtin.debug:
    msg: "Granted '{{ groupPermissions }}' to group '{{ group }}' on GPO '{{ gpoName }}'."
  when: gpoPermResult.output | selectattr('PermissionSet', 'defined') | map(attribute='PermissionSet') | list | last | bool

- name: Permission set failed
  ansible.builtin.fail:
    msg: "Failed to set permissions on GPO '{{ gpoName }}' - Error: {{ (gpoPermResult.output | selectattr('SetError', 'defined') | list | last).SetError }}"
  when:
    - not (gpoPermResult.output | selectattr('AlreadyGranted', 'defined') | map(attribute='AlreadyGranted') | list | last | bool)
    - not (gpoPermResult.output | selectattr('PermissionSet', 'defined') | map(attribute='PermissionSet') | list | last | bool)
