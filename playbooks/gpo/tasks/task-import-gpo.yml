- name: Import GPO
  ansible.windows.win_powershell:
    script: |
      $targetDomain = '{{ targetDomain }}'
      $targetDC = '{{ targetDC }}'
      $gpoName = '{{ gpoName }}'
      $targetGpoName = '{{ targetGpoName }}'
      $backupFolder = '{{ importPath }}' + '\{{ backupDate }}\' + $gpoName

      try {
          if ($targetGpoName -eq $gpoName) {
              $existing = Get-GPO -Name $targetGpoName -Domain $targetDomain -Server $targetDC -ErrorAction SilentlyContinue
              if ($existing) {
                  Import-GPO -BackupGpoName $gpoName -TargetName $targetGpoName -Domain $targetDomain -Server $targetDC -Path $backupFolder -ErrorAction Stop
              } else {
                  New-GPO -Name $targetGpoName -Domain $targetDomain -Server $targetDC -ErrorAction Stop | Out-Null
                  Import-GPO -BackupGpoName $gpoName -TargetName $targetGpoName -Domain $targetDomain -Server $targetDC -Path $backupFolder -ErrorAction Stop
              }
          } else {
              New-GPO -Name $targetGpoName -Domain $targetDomain -Server $targetDC -ErrorAction Stop | Out-Null
              Import-GPO -BackupGpoName $gpoName -TargetName $targetGpoName -Domain $targetDomain -Server $targetDC -Path $backupFolder -ErrorAction Stop
          }
          Write-Output ([PSCustomObject]@{
              ImportSuccess  = $true
              SourceName     = $gpoName
              TargetName     = $targetGpoName
              BackupDate     = '{{ backupDate }}'
              Domain         = $targetDomain
          })
      }
      catch {
          Write-Output ([PSCustomObject]@{
              ImportSuccess  = $false
              SourceName     = $gpoName
              TargetName     = $targetGpoName
              Domain         = $targetDomain
              ImportError    = $_.Exception.Message
          })
      }
  register: importResult

- name: Import succeeded
  ansible.builtin.debug:
    msg: "Successfully imported '{{ gpoName }}' as '{{ targetGpoName }}' into '{{ targetDomain }}' from backup '{{ backupDate }}'"
  when:
    - importResult.output | selectattr('ImportSuccess', 'defined') | map(attribute='ImportSuccess') | list | last | bool

- name: Import failed
  ansible.builtin.fail:
    msg: "Failed to import '{{ gpoName }}' as '{{ targetGpoName }}' into '{{ targetDomain }}' - Error: {{ (importResult.output | selectattr('ImportError', 'defined') | list | last).ImportError }}"
  when:
    - not (importResult.output | selectattr('ImportSuccess', 'defined') | map(attribute='ImportSuccess') | list | last | bool)
