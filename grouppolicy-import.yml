- name: Group Policy - Import
  hosts: domain_controllers
  vars_files:
    - vars/ous.yml
    - vars/domains.yml
  vars:
    backupBasePath: 'C:\Windows\Temp\GPOBackup'
  vars_prompt:
    - name: domainSelection
      prompt: |
        Select target domain:
        {% for domain in domains %}
        {{ loop.index }}. {{ domain.name }} - {{ domain.fqdn }}
        {% endfor %}
        Enter number
      private: false
    - name: gpoName
      prompt: What is the name of the GPO to import?
      private: false
    - name: backupDate
      prompt: What is the backup date to restore from? (yyyy-MM-dd)
      private: false
    - name: backupId
      prompt: What is the backup ID (GUID) to restore?
      private: false

  tasks:
    - name: Set target domain from selection
      ansible.builtin.set_fact:
        targetDomain: "{{ domains[domainSelection | int - 1].fqdn }}"

    - name: Ensure Domain Controllers are available
      ansible.windows.win_ping:

    - name: Ensure GPMC is available
      ansible.windows.win_feature:
        name: GPMC
        state: present

    - name: Show input vars
      ansible.builtin.debug:
        msg: "GPO: {{ gpoName }} | Domain: {{ targetDomain }} | Backup Date: {{ backupDate }} | Backup ID: {{ backupId }}"

    - name: Check if GPO already exists
      ansible.windows.win_powershell:
        script: |
          $targetDomain = '{{ targetDomain }}'
          $gpoName = '{{ gpoName }}'

          $allGpos = Get-GPO -All -Domain $targetDomain
          $match = $allGpos | Where-Object { $_.DisplayName -eq $gpoName }
          if ($match) {
              Write-Output ([PSCustomObject]@{
                  Exists           = $true
                  DisplayName      = $match.DisplayName
                  DomainName       = $match.DomainName
                  Owner            = $match.Owner
                  Id               = $match.Id
                  GpoStatus        = $match.GpoStatus
                  CreationTime     = $match.CreationTime
                  ModificationTime = $match.ModificationTime
              })
          } else {
              Write-Output ([PSCustomObject]@{
                  Exists      = $false
                  DisplayName = $gpoName
              })
          }
      register: gpoCheck

    - name: Show GPO check result
      ansible.builtin.debug:
        var: gpoCheck.output | selectattr('Exists', 'defined') | list | last

    - name: Confirm overwrite if GPO exists
      ansible.builtin.pause:
        prompt: "GPO '{{ gpoName }}' already exists in domain '{{ targetDomain }}'. Do you want to overwrite it? (yes/no)"
      register: overwriteConfirm
      when: gpoCheck.output | selectattr('Exists', 'defined') | map(attribute='Exists') | list | last | bool

    - name: Exit if overwrite not confirmed
      ansible.builtin.fail:
        msg: "Import aborted. GPO '{{ gpoName }}' already exists and overwrite was not confirmed."
      when:
        - gpoCheck.output | selectattr('Exists', 'defined') | map(attribute='Exists') | list | last | bool
        - overwriteConfirm.user_input | lower != 'yes'

    - name: Import GPO
      ansible.windows.win_powershell:
        script: |
          $targetDomain = '{{ targetDomain }}'
          $gpoName = '{{ gpoName }}'
          $backupFolder = '{{ backupBasePath }}' + '\{{ backupDate }}'
          $gpoExists = '{{ gpoCheck.output | selectattr("Exists", "defined") | map(attribute="Exists") | list | last }}'

          try {
              if ($gpoExists -eq 'True') {
                  Import-GPO -BackupId '{{ backupId }}' -TargetName $gpoName -Domain $targetDomain -Path $backupFolder -ErrorAction Stop
              } else {
                  New-GPO -Name $gpoName -Domain $targetDomain -ErrorAction Stop | Out-Null
                  Import-GPO -BackupId '{{ backupId }}' -TargetName $gpoName -Domain $targetDomain -Path $backupFolder -ErrorAction Stop
              }
              Write-Output ([PSCustomObject]@{
                  ImportSuccess = $true
                  DisplayName   = $gpoName
                  BackupId      = '{{ backupId }}'
                  Domain        = $targetDomain
              })
          }
          catch {
              Write-Output ([PSCustomObject]@{
                  ImportSuccess = $false
                  DisplayName   = $gpoName
                  Domain        = $targetDomain
                  ImportError   = $_.Exception.Message
              })
          }
      register: importResult
      when: >
        not (gpoCheck.output | selectattr('Exists', 'defined') | map(attribute='Exists') | list | last | bool)
        or overwriteConfirm.user_input | lower == 'yes'

    - name: Import succeeded
      ansible.builtin.debug:
        msg: "Successfully imported '{{ gpoName }}' into '{{ targetDomain }}' from backup '{{ backupId }}'"
      when:
        - importResult is not skipped
        - importResult.output | selectattr('ImportSuccess', 'defined') | map(attribute='ImportSuccess') | list | last | bool

    - name: Import failed
      ansible.builtin.fail:
        msg: "Failed to import '{{ gpoName }}' into '{{ targetDomain }}' - Error: {{ (importResult.output | selectattr('ImportError', 'defined') | list | last).ImportError }}"
      when:
        - importResult is not skipped
        - not (importResult.output | selectattr('ImportSuccess', 'defined') | map(attribute='ImportSuccess') | list | last | bool)