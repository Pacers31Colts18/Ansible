- name: Group Policy - Link
  hosts: domain_controllers
  vars_files:
    - vars/ous.yml
    - vars/domains.yml
  vars_prompt:
    - name: domainSelection
      prompt: |
        Select target domain:
        {% for domain in domains %}
        {{ loop.index }}. {{ domain.name }} - {{ domain.fqdn }}
        {% endfor %}
        Enter number
      private: false
    - name: gpoName
      prompt: Enter the GPO name
      private: false

  tasks:
    - name: Set target domain from selection
      ansible.builtin.set_fact:
        targetDomain: "{{ domains[domainSelection | int - 1].fqdn }}"

    - name: Ensure Domain Controllers are available
      ansible.windows.win_ping:

    - name: Ensure GPMC is available
      ansible.windows.win_feature:
        name: GPMC
        state: present

    - name: Show input vars
      ansible.builtin.debug:
        msg: "GPO: {{ gpoName }} | Domain: {{ targetDomain }} | Linking to {{ ous | length }} OUs"

    - name: Check if GPO exists
      ansible.windows.win_powershell:
        script: |
          $targetDomain = '{{ targetDomain }}'
          $gpoName = '{{ gpoName }}'

          $allGpos = Get-GPO -All -Domain $targetDomain
          $match = $allGpos | Where-Object { $_.DisplayName -eq $gpoName }
          if ($match) {
              Write-Output ([PSCustomObject]@{
                  Exists           = $true
                  DisplayName      = $match.DisplayName
                  DomainName       = $match.DomainName
                  Owner            = $match.Owner
                  Id               = $match.Id
                  GpoStatus        = $match.GpoStatus
                  CreationTime     = $match.CreationTime
                  ModificationTime = $match.ModificationTime
              })
          } else {
              Write-Output ([PSCustomObject]@{
                  Exists      = $false
                  DisplayName = $gpoName
              })
          }
      register: gpoCheck

    - name: GPO does not exist
      ansible.builtin.fail:
        msg: "GPO '{{ gpoName }}' does not exist in '{{ targetDomain }}'. Cannot link."
      when: not (gpoCheck.output | selectattr('Exists', 'defined') | map(attribute='Exists') | list | last | bool)

    - name: GPO exists
      ansible.builtin.debug:
        msg: "GPO '{{ gpoName }}' exists in '{{ targetDomain }}'. Proceeding to link check."
      when: gpoCheck.output | selectattr('Exists', 'defined') | map(attribute='Exists') | list | last | bool

    - name: Check and link GPO to each OU
      ansible.windows.win_powershell:
        script: |
          $targetDomain = '{{ targetDomain }}'
          $gpoName = '{{ gpoName }}'
          $targetOU = '{{ item.dn }}'
          $ouName = '{{ item.name }}'

          function ConvertTo-DistinguishedName {
              param([string]$CanonicalName)
              $parts = $CanonicalName.Split('/')
              $domain = $parts[0]
              $ouParts = $parts[1..($parts.Length - 1)]
              $dcParts = ($domain.Split('.') | ForEach-Object { "DC=$_" }) -join ','
              $ouDN = if ($ouParts.Count -gt 0) {
                  (($ouParts | Select-Object -Last ($ouParts.Count) | ForEach-Object { "OU=$_" } | Sort-Object -Descending) -join ',') + ','
              } else { "" }
              return "$ouDN$dcParts"
          }

          Try {
              $AllGPOs = Get-GPO -All -Domain $targetDomain | Where-Object { $_.DisplayName -eq $gpoName }
              $linkedToTarget = $false

              foreach ($g in $AllGPOs) {
                  [xml]$GpoReport = Get-GPOReport -ReportType Xml -Guid $g.Id -Domain $targetDomain
                  foreach ($i in $GpoReport.GPO.LinksTo) {
                      $ouDN = ConvertTo-DistinguishedName -CanonicalName $i.SOMPath
                      if ($ouDN -ieq $targetOU) {
                          $linkedToTarget = $true
                      }
                  }
              }

              if ($linkedToTarget) {
                  Write-Output ([PSCustomObject]@{
                      OUName        = $ouName
                      TargetOU      = $targetOU
                      AlreadyLinked = $true
                      Success       = $true
                      Action        = "Skipped"
                  })
              } else {
                  New-GPLink -Name $gpoName -Target $targetOU -Domain $targetDomain -ErrorAction Stop
                  Write-Output ([PSCustomObject]@{
                      OUName        = $ouName
                      TargetOU      = $targetOU
                      AlreadyLinked = $false
                      Success       = $true
                      Action        = "Linked"
                  })
              }
          }
          Catch {
              Write-Output ([PSCustomObject]@{
                  OUName        = $ouName
                  TargetOU      = $targetOU
                  AlreadyLinked = $false
                  Success       = $false
                  Action        = "Failed"
                  ErrorMessage  = $_.Exception.Message
              })
          }
      loop: "{{ ous }}"
      register: ouLinkResults

    - name: Link results summary
      ansible.builtin.debug:
        msg: "{{ item.output | selectattr('Action', 'defined') | list | last }}"
      loop: "{{ ouLinkResults.results }}"
      loop_control:
        label: "{{ item.item.name }}"